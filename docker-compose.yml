services:
  api:
    build:
      context: .
      target: development
    container_name: passarela-api
    ports:
      - "3000:${PORT:-3000}"
    env_file:
      - .env
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    volumes:
      - ./src:/usr/src/app/src
      - ./__tests__:/usr/src/app/__tests__
      - ./tsconfig.json:/usr/src/app/tsconfig.json
      - ./tsconfig.build.json:/usr/src/app/tsconfig.build.json
      - ./nest-cli.json:/usr/src/app/nest-cli.json
      - ./jest.config.ts:/usr/src/app/jest.config.ts
      - ./.swcrc:/usr/src/app/.swcrc
      - node_modules:/usr/src/app/node_modules
    command: npm run start:dev
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - passarela-network

  mongo:
    image: mongo:8.0
    container_name: passarela-mongo
    # MONGO_LOG_PATH controla visibilidade do log na fonte (mongod), não no driver do Docker —
    # isso apaga o log tanto de "docker compose logs" quanto do attach ao vivo ("docker compose up" sem -d).
    # Padrão /dev/null (silencioso). Setar MONGO_LOG_PATH=/dev/stdout no .env pra ver o log do mongod.
    command: ["mongod", "--quiet", "--logpath", "${MONGO_LOG_PATH:-/dev/null}"]
    ports:
      - "27019:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
    volumes:
      - passarela-mongo-data:/data/db
    healthcheck:
      # 'ping' é isento de autenticação no MongoDB — sem -u/-p aqui evita handshake de auth a cada checagem, reduzindo ruído no log
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - passarela-network

networks:
  passarela-network:
    driver: bridge

volumes:
  passarela-mongo-data:
  node_modules:
